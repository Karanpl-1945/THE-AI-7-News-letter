name: Review newsletter

on:
  workflow_dispatch:
    inputs:
      issue_key:
        description: "Issue key from the admin review email, e.g. 2026-W29"
        required: true
        type: string
      decision:
        description: Approve to send to subscribers, or request changes with feedback below
        required: true
        type: choice
        options:
          - approve
          - request_changes
      feedback:
        description: "Required when decision=request_changes: what to change and why"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: weekly-newsletter-generation
  cancel-in-progress: false

jobs:
  review-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Apply the admin's review decision
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_SUMMARY_MODEL: ${{ vars.GROQ_SUMMARY_MODEL || 'llama-3.1-8b-instant' }}
          GROQ_EDITOR_MODEL: ${{ vars.GROQ_EDITOR_MODEL || 'llama-3.3-70b-versatile' }}
          GROQ_MAX_RETRIES: ${{ vars.GROQ_MAX_RETRIES || '2' }}
          GROQ_MAX_RETRY_WAIT_SECONDS: ${{ vars.GROQ_MAX_RETRY_WAIT_SECONDS || '60' }}
          GROQ_REQUEST_TIMEOUT_SECONDS: ${{ vars.GROQ_REQUEST_TIMEOUT_SECONDS || '45' }}
          GROQ_MIN_REQUEST_INTERVAL_SECONDS: ${{ vars.GROQ_MIN_REQUEST_INTERVAL_SECONDS || '6' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_CONNECT_TIMEOUT_SECONDS: ${{ vars.DATABASE_CONNECT_TIMEOUT_SECONDS || '10' }}
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_PRESIGNED_URL_EXPIRY_SECONDS: ${{ vars.R2_PRESIGNED_URL_EXPIRY_SECONDS || '3600' }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TRANSPORT: ${{ vars.EMAIL_TRANSPORT || 'gmail_smtp' }}
          USER_NAME: ${{ vars.USER_NAME }}
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          API_SIGNING_SECRET: ${{ secrets.API_SIGNING_SECRET }}
          API_TOKEN_MAX_AGE_SECONDS: ${{ vars.API_TOKEN_MAX_AGE_SECONDS || '259200' }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ vars.LANGFUSE_BASE_URL || secrets.LANGFUSE_BASE_URL }}
        run: |
          python -m graph.review \
            --issue-key "${{ inputs.issue_key }}" \
            --decision "${{ inputs.decision }}" \
            --feedback "${{ inputs.feedback }}"

      - name: Upload regenerated HTML and PDF (only on request_changes)
        if: inputs.decision == 'request_changes'
        uses: actions/upload-artifact@v4
        with:
          name: ai-newsletter-review-${{ github.run_number }}
          path: output/
          if-no-files-found: warn
          retention-days: 7
