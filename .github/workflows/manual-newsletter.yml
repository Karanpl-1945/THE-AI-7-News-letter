name: Manual newsletter dry run

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: manual-newsletter-dry-run
  cancel-in-progress: false

jobs:
  generate-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate newsletter without sending email
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ vars.LANGFUSE_BASE_URL }}
        run: python main.py --dry-run

      - name: Upload generated HTML and PDF
        uses: actions/upload-artifact@v4
        with:
          name: ai-newsletter-${{ github.run_number }}
          path: output/
          if-no-files-found: error
          retention-days: 7
