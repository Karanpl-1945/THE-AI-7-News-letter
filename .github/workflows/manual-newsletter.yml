name: Manual newsletter dry run

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: manual-newsletter-dry-run
  cancel-in-progress: false

jobs:
  generate-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Verify Langfuse authentication
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ vars.LANGFUSE_BASE_URL || secrets.LANGFUSE_BASE_URL }}
        run: python -c "from langfuse import get_client; assert get_client().auth_check(), 'Langfuse authentication failed'"

      - name: Initialize PostgreSQL schema
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_CONNECT_TIMEOUT_SECONDS: ${{ vars.DATABASE_CONNECT_TIMEOUT_SECONDS || '10' }}
        run: |
          python -m database.checkpointer
          python -m database.migrate

      - name: Generate newsletter without sending email
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_SUMMARY_MODEL: ${{ vars.GROQ_SUMMARY_MODEL || 'llama-3.1-8b-instant' }}
          GROQ_EDITOR_MODEL: ${{ vars.GROQ_EDITOR_MODEL || 'llama-3.3-70b-versatile' }}
          GROQ_MAX_RETRIES: ${{ vars.GROQ_MAX_RETRIES || '2' }}
          GROQ_MAX_RETRY_WAIT_SECONDS: ${{ vars.GROQ_MAX_RETRY_WAIT_SECONDS || '60' }}
          GROQ_REQUEST_TIMEOUT_SECONDS: ${{ vars.GROQ_REQUEST_TIMEOUT_SECONDS || '45' }}
          GROQ_MIN_REQUEST_INTERVAL_SECONDS: ${{ vars.GROQ_MIN_REQUEST_INTERVAL_SECONDS || '6' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_CONNECT_TIMEOUT_SECONDS: ${{ vars.DATABASE_CONNECT_TIMEOUT_SECONDS || '10' }}
          WORKFLOW_TRIGGER: github_manual
          GITHUB_TOKEN: ${{ github.token }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ vars.LANGFUSE_BASE_URL || secrets.LANGFUSE_BASE_URL }}
        run: python main.py --dry-run

      - name: Upload generated HTML and PDF
        uses: actions/upload-artifact@v4
        with:
          name: ai-newsletter-${{ github.run_number }}
          path: output/
          if-no-files-found: error
          retention-days: 7
