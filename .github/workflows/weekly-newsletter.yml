name: Weekly newsletter generation

on:
  # Weekly, Sundays at 8:00 AM IST (02:30 UTC Sunday).
  schedule:
    - cron: "30 2 * * 0"
  workflow_dispatch:
    inputs:
      force_new_run:
        description: Start a fresh checkpoint instead of reusing this week's run
        required: false
        type: boolean
        default: false
      dry_run:
        description: Generate only — skip the admin review email entirely
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: weekly-newsletter-generation
  cancel-in-progress: false

jobs:
  generate-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Verify Langfuse authentication
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ vars.LANGFUSE_BASE_URL || secrets.LANGFUSE_BASE_URL }}
        run: python -c "from langfuse import get_client; assert get_client().auth_check(), 'Langfuse authentication failed'"

      - name: Initialize PostgreSQL schema
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_CONNECT_TIMEOUT_SECONDS: ${{ vars.DATABASE_CONNECT_TIMEOUT_SECONDS || '10' }}
        run: |
          python -m database.checkpointer
          python -m database.migrate

      - name: Generate newsletter and notify admin for review
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TRANSPORT: ${{ vars.EMAIL_TRANSPORT || 'gmail_smtp' }}
          USER_NAME: ${{ vars.USER_NAME }}
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          API_SIGNING_SECRET: ${{ secrets.API_SIGNING_SECRET }}
          API_TOKEN_MAX_AGE_SECONDS: ${{ vars.API_TOKEN_MAX_AGE_SECONDS || '259200' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_SUMMARY_MODEL: ${{ vars.GROQ_SUMMARY_MODEL || 'llama-3.1-8b-instant' }}
          GROQ_EDITOR_MODEL: ${{ vars.GROQ_EDITOR_MODEL || 'llama-3.3-70b-versatile' }}
          GROQ_MAX_RETRIES: ${{ vars.GROQ_MAX_RETRIES || '2' }}
          GROQ_MAX_RETRY_WAIT_SECONDS: ${{ vars.GROQ_MAX_RETRY_WAIT_SECONDS || '60' }}
          GROQ_REQUEST_TIMEOUT_SECONDS: ${{ vars.GROQ_REQUEST_TIMEOUT_SECONDS || '45' }}
          GROQ_MIN_REQUEST_INTERVAL_SECONDS: ${{ vars.GROQ_MIN_REQUEST_INTERVAL_SECONDS || '6' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_CONNECT_TIMEOUT_SECONDS: ${{ vars.DATABASE_CONNECT_TIMEOUT_SECONDS || '10' }}
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_PRESIGNED_URL_EXPIRY_SECONDS: ${{ vars.R2_PRESIGNED_URL_EXPIRY_SECONDS || '3600' }}
          WORKFLOW_TRIGGER: ${{ github.event_name == 'schedule' && 'github_schedule' || 'github_manual' }}
          GITHUB_TOKEN: ${{ github.token }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ vars.LANGFUSE_BASE_URL || secrets.LANGFUSE_BASE_URL }}
        run: python main.py ${{ inputs.dry_run && '--dry-run' || '' }} ${{ inputs.force_new_run && '--force' || '' }}

      - name: Upload generated HTML and PDF
        uses: actions/upload-artifact@v4
        with:
          name: ai-newsletter-${{ github.run_number }}
          path: output/
          if-no-files-found: error
          retention-days: 7
